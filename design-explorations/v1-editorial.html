<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>v1 — Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#F4EFE6; --ink:#1A1612; --accent:#B5482E; --muted:#7A6E5E; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { background:var(--bg); font-family:'Inter',sans-serif; color:var(--ink); display:flex; align-items:center; justify-content:center; }
  .phone { width:390px; height:844px; background:var(--bg); border-radius:50px; border:1px solid rgba(0,0,0,0.08); box-shadow:0 0 0 8px #1a1612, 0 40px 100px rgba(0,0,0,0.3); overflow:hidden; position:relative; display:flex; flex-direction:column; padding:80px 36px 60px; }
  .top-meta { font-size:10px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; font-weight:500; }
  .hero { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .num { font-family:'Fraunces',serif; font-size:14px; color:var(--accent); font-weight:500; margin-bottom:18px; }
  .num span { display:inline-block; width:28px; height:1px; background:var(--accent); vertical-align:middle; margin-right:8px; }
  h1 { font-family:'Fraunces',serif; font-size:84px; line-height:0.92; font-weight:300; letter-spacing:-2px; margin-bottom:24px; }
  h1 em { font-style:italic; color:var(--accent); font-weight:500; }
  .lede { font-family:'Fraunces',serif; font-size:20px; line-height:1.4; color:var(--ink); font-weight:300; max-width:300px; }
  .lede em { font-style:italic; color:var(--accent); }
  .footer { display:flex; justify-content:space-between; align-items:flex-end; }
  .cta { background:var(--ink); color:var(--bg); border:none; padding:18px 36px; font-family:'Inter',sans-serif; font-size:11px; letter-spacing:3px; text-transform:uppercase; cursor:pointer; border-radius:0; font-weight:500; }
  .cta:hover { background:var(--accent); }
  .meta-r { text-align:right; font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; line-height:1.6; }
  .ornament { font-family:'Fraunces',serif; font-style:italic; font-size:32px; color:var(--accent); position:absolute; top:140px; right:36px; }
</style></head>
<body>
<div class="phone">
  <div class="top-meta">Avatarme — Vol. 01</div>
  <div class="ornament">№1</div>
  <div class="hero">
    <div class="num"><span></span>An identity study</div>
    <h1>The animal<br/><em>inside</em> you.</h1>
    <p class="lede">Answer with your <em>instincts</em>. Discover what shape your spirit takes.</p>
  </div>
  <div class="footer">
    <button class="cta">Begin →</button>
    <div class="meta-r">Private<br/>~3 min</div>
  </div>
</div>
</body></html>
